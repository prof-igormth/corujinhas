<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Corujinhas Financeiras</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">

    <div id="screen-welcome" class="screen active p-6 justify-center items-center text-center">
      <div class="text-[5rem] mb-6 bounce-mascot">🦉🧮</div>
      <h1 class="text-2xl font-black text-[#1C2A4D] mb-8 leading-tight">Vamos descobrir o melhor ponto para começar sua jornada financeira!</h1>
      <div class="w-full space-y-4">
        <button onclick="goToScreen('screen-map')" class="btn-3d w-full p-4 rounded-2xl text-left bg-white border-2 border-gray-200 hover:bg-gray-50 flex flex-col gap-1">
          <span class="font-black text-[#7A5CA0] text-lg">Começar do zero</span>
          <span class="text-[#1C2A4D] opacity-70 font-semibold text-sm">Aprenda os conceitos básicos, passo a passo.</span>
        </button>
        <button onclick="goToScreen('screen-diagnostic')" class="btn-3d w-full p-4 rounded-2xl text-left bg-white border-2 border-gray-200 hover:bg-gray-50 flex flex-col gap-1">
          <span class="font-black text-[#7A5CA0] text-lg">Descobrir meu nível</span>
          <span class="text-[#1C2A4D] opacity-70 font-semibold text-sm">A Corujinha vai recomendar por onde começar.</span>
        </button>
      </div>
    </div>

    <div id="screen-diagnostic" class="screen p-6 justify-center items-center text-center bg-[#BCA6D3]/20">
      <div class="text-[5rem] mb-4 bounce-mascot">🦉🪙</div>
      <h1 class="text-2xl font-black text-[#7A5CA0] mb-8">O que você entende sobre finanças?</h1>
      <div class="w-full space-y-3">
        <button onclick="goToScreen('screen-map')" class="btn-3d w-full p-4 rounded-2xl font-bold text-[#1C2A4D] bg-white border-2 border-gray-200 hover:border-[#7A5CA0] hover:text-[#7A5CA0]">Não sei nada sobre finanças</button>
        <button onclick="goToScreen('screen-map')" class="btn-3d w-full p-4 rounded-2xl font-bold text-[#1C2A4D] bg-white border-2 border-gray-200 hover:border-[#7A5CA0] hover:text-[#7A5CA0]">Sei coisas básicas (poupar, gastar)</button>
        <button onclick="goToScreen('screen-map')" class="btn-3d w-full p-4 rounded-2xl font-bold text-[#1C2A4D] bg-white border-2 border-gray-200 hover:border-[#7A5CA0] hover:text-[#7A5CA0]">Consigo organizar um orçamento</button>
        <button onclick="goToScreen('screen-map')" class="btn-3d w-full p-4 rounded-2xl font-bold text-[#1C2A4D] bg-white border-2 border-gray-200 hover:border-[#7A5CA0] hover:text-[#7A5CA0]">Já planejo metas e investimentos</button>
      </div>
    </div>

    <div id="screen-map" class="screen">
      <header class="sticky top-0 z-30 bg-white/95 backdrop-blur-md px-4 py-3 flex items-center justify-between border-b-2 border-gray-100">
        <div class="flex items-center font-black text-[#7A5CA0] text-2xl">🦉</div>
        <div class="flex gap-4">
          <div class="flex items-center gap-1.5 font-bold text-[#6FB7E9]"><span class="text-xl">💎</span> <span id="ui-gems">0</span></div>
          <div class="flex items-center gap-1.5 font-bold text-[#F4C542]"><span class="text-xl">⚡</span> <span id="ui-energy">5</span></div>
        </div>
      </header>
      <main class="flex-1 overflow-y-auto pb-28" id="scroll-container">
        <div class="bg-[#7A5CA0] text-white p-5 rounded-b-3xl mb-6 shadow-sm">
          <h2 class="text-sm font-black uppercase opacity-90 tracking-widest mb-1">Seção 1, Unidade 1</h2>
          <h1 class="text-xl font-extrabold leading-tight">Conceitos sobre Educação Financeira</h1>
        </div>
        <div id="journey-path" class="flex flex-col items-center relative w-full py-4 space-y-4"></div>
      </main>
    </div>

    <div id="screen-lesson" class="screen flex-col">
      <div class="px-4 pt-6 pb-2 flex items-center gap-4">
        <button onclick="quitLesson()" class="text-[#BCA6D3] font-black text-xl px-2 hover:text-[#7A5CA0]">✕</button>
        <div class="flex-1 bg-gray-200 h-4 rounded-full overflow-hidden">
          <div id="lesson-progress" class="bg-[#7A5CA0] w-0 h-full rounded-full progress-bar-fill relative">
            <div class="bg-white/30 h-1.5 w-full mx-2 mt-0.5 rounded-full absolute"></div>
          </div>
        </div>
        <div class="flex items-center gap-1.5 font-bold text-[#F4C542]">
          <span class="text-xl">⚡</span> <span id="lesson-energy">5</span>
        </div>
      </div>

      <main id="lesson-content-area" class="flex-1 overflow-y-auto p-6 flex flex-col justify-center"></main>

      <div class="border-t-2 border-gray-100 p-4 pb-8 bg-white z-10">
        <button id="btn-lesson-action" onclick="advanceLesson()" class="btn-3d w-full py-3.5 rounded-2xl font-black text-[17px] uppercase tracking-wider text-white bg-[#7A5CA0] border-[#7A5CA0] border-b-[#4C5DAA]">
          Continuar
        </button>
      </div>
    </div>

    <div id="screen-success" class="screen p-6 justify-between items-center bg-white">
      <div class="flex-1 w-full flex flex-col items-center justify-center">
        <div class="text-[7rem] mb-6 bounce-mascot drop-shadow-md">🏆</div>
        <h1 class="text-3xl font-black text-[#F4C542] mb-2 text-center">Unidade Concluída!</h1>
        <p class="text-[#6FB7E9] font-black mb-4 text-xl text-center">+15 Gemas</p>
      </div>
      <div class="w-full pb-6">
        <button onclick="finishNode()" class="btn-3d w-full py-4 rounded-2xl font-black text-[17px] uppercase text-white bg-[#7A5CA0] border-[#7A5CA0] border-b-[#4C5DAA]">
          Continuar
        </button>
      </div>
    </div>

    <div id="modal-overlay" class="overlay" onclick="closeSheet()"></div>
    
    <div id="bottom-sheet" class="bottom-sheet bg-white shadow-[0_-10px_40px_rgba(28,42,77,0.15)] flex flex-col pt-2">
      <div class="w-12 h-1.5 bg-[#BCA6D3] rounded-full mx-auto my-3"></div>
      <div class="p-6 pb-8">
        <h2 id="sheet-title" class="text-2xl font-black text-[#1C2A4D] leading-tight mb-1">Título</h2>
        <p id="sheet-desc" class="text-[#1C2A4D] opacity-70 font-bold mb-6 text-sm">Descrição</p>
        <div class="bg-[#f0f7fd] rounded-2xl p-4 flex items-center justify-between mb-2 border border-[#6FB7E9]/30">
          <span class="font-black text-[#1C2A4D] opacity-60 uppercase text-xs tracking-wider">Recompensa</span>
          <span class="font-black text-[#6FB7E9] text-lg">💎 +15</span>
        </div>
      </div>
      <div class="w-full p-4 pt-0 bg-white">
        <button id="btn-start-node" onclick="startLesson()" class="btn-3d w-full py-3.5 rounded-2xl font-black text-[17px] uppercase tracking-wider text-white bg-[#7A5CA0] border-[#7A5CA0] border-b-[#4C5DAA]">
          COMEÇAR
        </button>
      </div>
    </div>

    <div id="feedback-overlay" class="bottom-sheet p-6 pb-10 flex flex-col gap-4">
      <div class="flex items-center gap-4">
        <div id="feedback-icon" class="w-16 h-16 rounded-full flex items-center justify-center text-4xl font-black"></div>
        <h2 id="feedback-title" class="text-2xl font-black mb-1"></h2>
      </div>
      <button id="btn-feedback-continue" class="btn-3d w-full py-3.5 rounded-2xl font-black text-[17px] uppercase tracking-wider">
        Continuar
      </button>
    </div>

  </div> <script src="script.js"></script>
</body>
</html>
